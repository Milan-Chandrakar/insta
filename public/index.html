<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Automation V2</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Sanatan automation</p>
          <h1>Publishing Control</h1>
        </div>
        <div class="status-strip" id="systemStatus">Loading...</div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Intake</p>
              <h2>WhatsApp Queue</h2>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="file" id="directUploadInput" accept=".zip,image/*,video/mp4" style="display: none;" />
              <button class="ghost" id="restartWhatsappButton" type="button">Restart WhatsApp</button>
              <button class="ghost" id="uploadMediaButton" type="button">Upload Media</button>
              <button class="ghost danger" id="factoryResetButton" type="button">Factory Reset</button>
              <button class="ghost" id="refreshButton" type="button">Refresh</button>
            </div>
          </div>
          <div class="list scroll-three" id="intakeList"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Queue</p>
              <h2>Upcoming Posts</h2>
            </div>
          </div>
          <div class="list scroll-three" id="destinationList"></div>
        </article>

        <article class="panel wide-full">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Pipeline</p>
              <h2>Live Status</h2>
            </div>
          </div>
          <div class="log-timeline" id="logList"></div>
        </article>
      </section>

      <div class="toast" id="toast" hidden></div>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
